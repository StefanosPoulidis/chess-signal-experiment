<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chess Signal Experiment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="login">
    <h1>Chess Signal Experiment</h1>
    <p class="intro">Please enter the username you were provided to begin.</p>
    <form id="login-form" autocomplete="off">
      <input
        id="username"
        type="text"
        name="username"
        placeholder="e.g., bold-tiger-429"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        required
      >
      <button type="submit">Begin</button>
    </form>
    <p id="status" class="status" aria-live="polite"></p>
    <p class="help">
      Usernames are case-insensitive. Format: <code>word-word-digits</code>.
    </p>
  </main>
  <script src="js/usernames.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
