<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chess Signal Experiment — Play</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet"
        href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="experiment">
  <main class="experiment-wrapper">
    <div id="experiment-ui">
      <header class="exp-header">
        <div id="puzzle-indicator" class="puzzle-indicator">Loading…</div>
        <div id="condition-badge" class="badge"></div>
      </header>
      <div class="move-meta">
        <span id="move-counter" class="move-counter"></span>
      </div>

      <div id="banner" class="signal-banner hidden" aria-live="polite"></div>

      <div class="board-wrapper">
        <div id="chess-board" style="width: 480px;"></div>
      </div>

      <footer class="exp-footer">
        <p id="status" class="status">&nbsp;</p>

        <div class="chess-clock">
          <div class="clock-display"><span id="timer">0.0</span><span class="clock-unit-inline">s</span></div>
          <div class="clock-label">Time on current move</div>
          <div id="clock-history" class="clock-history"></div>
        </div>

        <button id="next-button" class="hidden">Next puzzle →</button>
      </footer>
    </div>

    <div id="promotion-modal" class="promotion-modal hidden" role="dialog" aria-modal="true" aria-label="Promote pawn">
      <div class="promotion-overlay"></div>
      <div class="promotion-chooser">
        <div class="promo-title">Promote pawn to:</div>
        <div class="promo-buttons">
          <button class="promo-btn" data-piece="q" data-name="Queen"></button>
          <button class="promo-btn" data-piece="r" data-name="Rook"></button>
          <button class="promo-btn" data-piece="b" data-name="Bishop"></button>
          <button class="promo-btn" data-piece="n" data-name="Knight"></button>
        </div>
        <div class="promo-hint">Click outside to cancel.</div>
      </div>
    </div>

    <div id="survey-ui" class="hidden">
      <h1>Almost done — a few questions</h1>
      <p class="survey-intro">Please answer briefly before you finish.</p>
      <form id="survey-form">
        <label class="survey-field">
          <span>Question 1 (TBD — replace with real question later)</span>
          <input type="text" name="q1" autocomplete="off">
        </label>
        <label class="survey-field">
          <span>Question 2 (TBD)</span>
          <input type="text" name="q2" autocomplete="off">
        </label>
        <label class="survey-field">
          <span>Question 3 (TBD)</span>
          <textarea name="q3" rows="3"></textarea>
        </label>
        <button type="submit" id="survey-submit">Submit</button>
        <p id="survey-status" class="status" aria-live="polite"></p>
      </form>
    </div>

    <div id="finished-ui" class="hidden">
      <h1>Thank you for your participation!</h1>
      <p>We will email you regarding your compensation.</p>
    </div>
  </main>

  <!-- Third-party -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <!-- App -->
  <script src="js/config.js"></script>
  <script src="js/puzzles.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
  <script>
    window.addEventListener('load', () => {
      Game.start().catch(err => {
        document.getElementById('status').textContent = 'Error: ' + (err.message || err);
        console.error(err);
      });
      document.getElementById('next-button').addEventListener('click', Game.advance);
      document.getElementById('survey-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const answers = Object.fromEntries(fd.entries());
        Game.submitSurvey(answers);
      });
      window.addEventListener('resize', () => Board.resize());
    });
  </script>
</body>
</html>
